name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          config: '{"MD013": {"line_length": 120}, "MD033": false, "MD041": false}'
          globs: '**/*.md'
